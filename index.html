<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Check-In</title>

<script src="https://cdn.jsdelivr.net/npm/bwip-js@4.5.1/dist/bwip-js-min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>

*{
box-sizing:border-box;
}


body{

font-family:-apple-system,BlinkMacSystemFont,Arial;
background:#eaf5ff;
padding:30px;

}



.panel{

background:white;
width:430px;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px #aaa;

}



h1{

color:#0057a8;

}



input,select{

width:360px;

padding:12px;

margin:7px 0;

font-size:16px;

border-radius:8px;

border:1px solid #aaa;

}



button{

padding:12px 20px;

border:0;

border-radius:10px;

background:#0067b1;

color:white;

font-size:16px;

margin:8px 4px;

cursor:pointer;

}



.clear{

background:#777;

}



/* BOARDING PASS */


.ticket{

width:900px;

height:420px;

display:flex;

background:white;

border-radius:22px;

overflow:hidden;

box-shadow:0 10px 30px #888;

}



.main{

width:650px;

padding:30px;

background:linear-gradient(135deg,#0057a8,#00a8e8);

color:white;

}



.stub{

width:250px;

border-left:3px dashed #aaa;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

background:white;

padding:20px;

}



.airline{

font-size:32px;

font-weight:bold;

}



.class{

display:inline-block;

margin-top:10px;

background:white;

color:#0057a8;

padding:7px 18px;

border-radius:20px;

}



.passenger{

font-size:30px;

font-weight:bold;

margin-top:20px;

}



.route{

font-size:40px;

font-weight:bold;

margin:20px 0;

}



.info{

display:flex;

flex-wrap:wrap;

gap:25px;

}



.label{

font-size:12px;

opacity:.8;

}



.value{

font-size:18px;

font-weight:bold;

}



.confirm{

margin-top:25px;

}



#datamatrix{

width:150px;

height:150px;

}



/* PRINT EXACT PREVIEW */


@media print{


*{

-webkit-print-color-adjust:exact !important;

print-color-adjust:exact !important;

}



html,body{

margin:0;

padding:0;

background:white;

}



.panel,
button{

display:none !important;

}



#output{

display:block !important;

margin:0;

padding:0;

}



.ticket{

width:900px !important;

height:430px !important;

display:flex !important;

box-shadow:none !important;

border-radius:22px !important;

overflow:hidden !important;

}

.main{
    height:100%;
}

.main{

width:650px !important;

background:linear-gradient(135deg,#0057a8,#00a8e8) !important;

color:white !important;

}



.stub{

width:250px !important;

background:white !important;

}



@page{

size:auto;

margin:0;

}



}


</style>

</head>



<body>


<div class="panel">


<h1>Check-In</h1>


<h3>Flight Information</h3>


<input id="airline" placeholder="Airline Name">

<input id="flight" placeholder="Flight Number">

<input id="from" placeholder="Departure Airport">

<input id="to" placeholder="Arrival Airport">



<h3>Passenger Information</h3>


<input id="passengerName" placeholder="Passenger Full Name">

<input id="passport" placeholder="Passport / ID Number">



<h3>Travel Details</h3>


<select id="classType">

<option>Economy</option>

<option>Economy Extra</option>

<option>Business</option>

<option>First Class</option>

</select>



<label>Flight Date</label>

<input id="date" type="date">



<label>Boarding Time</label>

<input id="boarding" type="time">



<label>Estimated Departure Time</label>

<input id="DepartureTime" type="time">



<input id="terminal" placeholder="Terminal">

<input id="gate" placeholder="Gate">

<input id="seat" placeholder="Seat">



<button onclick="createTicket()">

Check In

</button>


<button onclick="window.print()">

Print

</button>

<button type="button" onclick="copyRawTSV()">Copy Data</button>

<button type="button" onclick="shareTicket()">
Share
</button>

<button class="clear" onclick="location.href=location.pathname">

Clear

</button>


</div>



<br>


<div id="output"></div>
<script>

let confirmation = "";


function formatDate(v){

let d=new Date(v);

return d.toLocaleDateString(
"en-US",
{
weekday:"short",
month:"short",
day:"numeric",
year:"numeric"
}
);

}



function formatTime(v){

if(!v) return "";

let d=new Date("2000-01-01T"+v);

return d.toLocaleTimeString(
"en-US",
{
hour:"numeric",
minute:"2-digit"
}
);

}

async function shareTicket() {

    const ticket = document.querySelector(".ticket");

    const canvas = await html2canvas(ticket,{
        scale:2,
        backgroundColor:null
    });

    canvas.toBlob(async function(blob){

        const file = new File(
            [blob],
            "BoardingPass.png",
            {type:"image/png"}
        );

        if(
            navigator.canShare &&
            navigator.canShare({files:[file]})
        ){

            try{

                await navigator.share({

                    title:"Boarding Pass",

                    files:[file]

                });

            }catch(e){}

        }else{

            const a=document.createElement("a");

            a.href=URL.createObjectURL(blob);

            a.download="BoardingPass.png";

            a.click();

            URL.revokeObjectURL(a.href);

        }

    });

}

function copyRawTSV() {

    const data = [
        confirmation,
        airline.value,
        flight.value,
        passengerName.value,
        passport.value,
        from.value,
        to.value,
        date.value,
        boarding.value,
        DepartureTime.value,
        terminal.value,
        gate.value,
        seat.value,
        classType.value
    ].join("\t");

    const ta = document.createElement("textarea");
    ta.value = data;
    document.body.appendChild(ta);

    ta.select();
    ta.setSelectionRange(0, 99999);

    try {
        document.execCommand("copy");
        alert("Copied!");
    } catch (e) {
        alert("Copy failed.");
    }

    document.body.removeChild(ta);
}

function createTicket(){


confirmation = Math.random().toString(36).substring(2,8).toUpperCase();



let dateText=formatDate(date.value);

let boardingText=formatTime(boarding.value);

let liftText=formatTime(DepartureTime.value);



/*
 SAME DATA MATRIX FORMAT
 DO NOT CHANGE
*/


let matrixData =

`BP
CONF:${confirmation}
FLIGHT:${flight.value}
FROM:${from.value}
TO:${to.value}
PASSENGER:${passengerName.value}
DATE:${date.value}
BOARDING:${boarding.value}
DepartureTime:${DepartureTime.value}
TERMINAL:${terminal.value}
GATE:${gate.value}
SEAT:${seat.value}
CLASS:${classType.value}`;





output.innerHTML=

`

<div class="ticket">


<div class="main">


<div class="airline">

${airline.value}

</div>



<div class="class">

${classType.value}

</div>



<div class="passenger">

${passengerName.value}

</div>



<div class="route">

${from.value} → ${to.value}

</div>




<div class="info">



<div>

<div class="label">
FLIGHT
</div>

<div class="value">
${flight.value}
</div>

</div>




<div>

<div class="label">
DATE
</div>

<div class="value">
${dateText}
</div>

</div>




<div>

<div class="label">
BOARDING
</div>

<div class="value">
${boardingText}
</div>

</div>




<div>

<div class="label">
DepartureTime
</div>

<div class="value">
${liftText}
</div>

</div>




<div>

<div class="label">
TERMINAL
</div>

<div class="value">
${terminal.value}
</div>

</div>




<div>

<div class="label">
GATE
</div>

<div class="value">
${gate.value}
</div>

</div>




<div>

<div class="label">
SEAT
</div>

<div class="value">
${seat.value}
</div>

</div>



</div>




<div class="confirm">

Confirmation:

<b>${confirmation}</b>

<br><br>

Passport:

${passport.value}

</div>



</div>






<div class="stub">


<b>
BOARDING PASS
</b>


<br><br>


CONFIRMATION

<br>

<b>
${confirmation}
</b>


<br><br>


<canvas id="datamatrix"></canvas>


<br>


${flight.value}

<br>

${seat.value}



</div>



</div>

`;





bwipjs.toCanvas(

"datamatrix",

{

bcid:"datamatrix",

text:matrixData,

scale:4,

includetext:false

}

);



}



</script>


</body>
</html>
